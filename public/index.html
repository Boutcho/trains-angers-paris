<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi trains Angers ⇄ Paris</title>
<style>
  :root {
    --bg:#0b0e14; --panel:#131824; --panel-2:#1a2130; --ink:#e8edf4;
    --ink-dim:#8b96a8; --line:#232c3d; --amber:#ffb300; --green:#3ddc84;
    --orange:#ff8a3d; --red:#ff4d5e; --blue:#4d9bff;
    --mono:"SF Mono","Roboto Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    --sans:"Segoe UI",system-ui,-apple-system,sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); font-family:var(--sans); min-height:100vh; padding:24px 16px 60px; }
  .wrap { max-width:900px; margin:0 auto; }
  header { margin-bottom:24px; }
  .title { font-family:var(--mono); font-size:13px; letter-spacing:3px; color:var(--amber); text-transform:uppercase; margin-bottom:6px; }
  h1 { font-size:30px; font-weight:700; letter-spacing:-0.5px; display:flex; align-items:center; gap:12px; }
  h1 .arrow { color:var(--amber); font-weight:400; }
  .subtitle { color:var(--ink-dim); font-size:14px; margin-top:6px; }

  .controls { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .tabs { display:flex; gap:6px; background:var(--panel); padding:5px; border-radius:12px; border:1px solid var(--line); }
  .tab { position:relative; background:transparent; color:var(--ink-dim); padding:9px 16px; border-radius:8px; font-size:14px; font-weight:600; border:none; cursor:pointer; }
  .tab.active { background:var(--panel-2); color:var(--amber); }

  /* --- La bulle rouge sur l'onglet --- */
  .badge {
    position:absolute; top:-6px; right:-6px;
    min-width:20px; height:20px; padding:0 6px;
    background:var(--red); color:#fff;
    font-size:11px; font-weight:700; font-family:var(--mono);
    border-radius:11px; display:none;
    align-items:center; justify-content:center;
    box-shadow:0 0 0 2px var(--panel);
  }
  .badge.show { display:flex; }

  .meta { color:var(--ink-dim); font-size:12px; font-family:var(--mono); display:flex; align-items:center; gap:8px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block; }
  .dot.stale { background:var(--ink-dim); }
  button.ghost { background:transparent; color:var(--ink-dim); border:1px solid var(--line); padding:6px 12px; font-size:12px; border-radius:8px; cursor:pointer; }
  button.ghost:hover { color:var(--ink); }
  .filter-toggle { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-dim); cursor:pointer; user-select:none; }
  .filter-toggle input { accent-color:var(--amber); }

  .board { background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  .board-head { display:grid; grid-template-columns:92px 1fr 96px; padding:12px 18px; background:var(--panel-2); font-family:var(--mono); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-dim); }
  .row { display:grid; grid-template-columns:92px 1fr 96px; padding:16px 18px; border-top:1px solid var(--line); align-items:center; }
  .row .time { font-family:var(--mono); font-size:22px; font-weight:700; }
  .row .time .new { color:var(--amber); }
  .row .time .old { color:var(--ink-dim); text-decoration:line-through; font-size:14px; display:block; }
  .row .dest { font-size:15px; }
  .row .dest .train-no { color:var(--ink-dim); font-size:12px; font-family:var(--mono); margin-top:3px; }
  .status { justify-self:end; font-size:12px; font-weight:700; padding:6px 12px; border-radius:20px; font-family:var(--mono); letter-spacing:.5px; white-space:nowrap; }
  .status.ontime { background:rgba(61,220,132,.14); color:var(--green); }
  .status.late { background:rgba(255,77,94,.14); color:var(--red); }
  .status.late-soft { background:rgba(255,138,61,.14); color:var(--orange); }
  .status.cancel { background:rgba(255,77,94,.22); color:var(--red); }
  .empty, .loading, .error { padding:40px 18px; text-align:center; color:var(--ink-dim); font-size:14px; }
  .error { color:var(--red); }
  footer { margin-top:22px; color:var(--ink-dim); font-size:12px; text-align:center; line-height:1.6; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">Tableau de bord</div>
    <h1>Angers <span class="arrow">⇄</span> Paris</h1>
    <div class="subtitle">Prochains départs et retards en temps réel · Données SNCF</div>
  </header>

  <div class="controls">
    <div class="tabs">
      <button class="tab active" data-dir="angers-paris">Angers → Paris<span class="badge" id="badge-angers-paris">0</span></button>
      <button class="tab" data-dir="paris-angers">Paris → Angers<span class="badge" id="badge-paris-angers">0</span></button>
    </div>
    <div class="meta">
      <label class="filter-toggle"><input type="checkbox" id="onlyLate"> Retards seulement</label>
      <span class="dot" id="liveDot"></span>
      <span id="lastUpdate">—</span>
      <button class="ghost" id="refreshBtn">Rafraîchir</button>
    </div>
  </div>

  <div class="board">
    <div class="board-head">
      <div>Départ</div>
      <div>Destination · Train</div>
      <div style="text-align:right;">État</div>
    </div>
    <div id="rows"><div class="loading">Chargement…</div></div>
  </div>

  <footer>Rafraîchissement automatique toutes les 60 secondes · Bulle rouge = nombre de trains en retard par sens.</footer>
</div>

<script>
let currentDir = "angers-paris";
let onlyLate = false;
let refreshTimer = null;
const cache = { "angers-paris": [], "paris-angers": [] };

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentDir = tab.dataset.dir;
    render();
  });
});
document.getElementById("refreshBtn").addEventListener("click", loadAll);
document.getElementById("onlyLate").addEventListener("change", (e) => { onlyLate = e.target.checked; render(); });

// On charge les DEUX sens à chaque cycle : ça permet d'afficher la
// bulle de retards même sur l'onglet qu'on ne regarde pas.
async function loadAll() {
  let ok = false;
  await Promise.all(["angers-paris", "paris-angers"].map(async (dir) => {
    try {
      const res = await fetch(`/api/departures?dir=${dir}`);
      if (!res.ok) return;
      const data = await res.json();
      cache[dir] = data.trains || [];
      updateBadge(dir, data.lateCount || 0);
      ok = true;
    } catch (e) { /* on ignore, l'autre sens peut réussir */ }
  }));
  render();
  stamp(); setDot(ok);
}

function updateBadge(dir, count) {
  const b = document.getElementById(`badge-${dir}`);
  if (count > 0) { b.textContent = count; b.classList.add("show"); }
  else { b.classList.remove("show"); }
}

function render() {
  const rows = document.getElementById("rows");
  let list = cache[currentDir] || [];
  if (onlyLate) list = list.filter(t => t.delayMin > 0 || t.cancelled);

  if (!list.length) {
    rows.innerHTML = onlyLate
      ? '<div class="empty">Aucun retard pour ce sens 🎉</div>'
      : '<div class="loading">Chargement des prochains départs…</div>';
    return;
  }
  rows.innerHTML = list.slice(0, 15).map(buildRow).join("");
}

function buildRow(t) {
  const destLabel = currentDir === "angers-paris" ? "Paris-Montparnasse" : "Angers-Saint-Laud";
  let statusHtml, timeHtml;
  if (t.cancelled) {
    statusHtml = '<span class="status cancel">SUPPRIMÉ</span>';
    timeHtml = `<span class="new">${fmt(t.baseTime)}</span>`;
  } else if (t.delayMin > 0) {
    const cls = t.delayMin >= 15 ? "late" : "late-soft";
    statusHtml = `<span class="status ${cls}">+${t.delayMin} MIN</span>`;
    timeHtml = `<span class="new">${fmt(t.realTime)}</span><span class="old">${fmt(t.baseTime)}</span>`;
  } else {
    statusHtml = '<span class="status ontime">À L\'HEURE</span>';
    timeHtml = `<span class="new">${fmt(t.baseTime)}</span>`;
  }
  return `<div class="row"><div class="time">${timeHtml}</div>`
       + `<div class="dest">${destLabel}<div class="train-no">Train ${t.trainNo}</div></div>`
       + `<div>${statusHtml}</div></div>`;
}

function fmt(s) { return s ? `${s.slice(9,11)}:${s.slice(11,13)}` : "—"; }
function stamp() {
  document.getElementById("lastUpdate").textContent = "Mis à jour " +
    new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}
function setDot(live) { document.getElementById("liveDot").classList.toggle("stale", !live); }

loadAll();
if (refreshTimer) clearInterval(refreshTimer);
refreshTimer = setInterval(loadAll, 60000);
</script>
</body>
</html>
