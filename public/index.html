<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi trains Angers ⇄ Paris</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #131824;
    --panel-2: #1a2130;
    --ink: #e8edf4;
    --ink-dim: #8b96a8;
    --line: #232c3d;
    --amber: #ffb300;
    --green: #3ddc84;
    --orange: #ff8a3d;
    --red: #ff4d5e;
    --blue: #4d9bff;
    --mono: "SF Mono", "Roboto Mono", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    --sans: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--sans);
    min-height: 100vh; padding: 24px 16px 60px;
  }
  .wrap { max-width: 900px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  .title {
    font-family: var(--mono); font-size: 13px; letter-spacing: 3px;
    color: var(--amber); text-transform: uppercase; margin-bottom: 6px;
  }
  h1 {
    font-size: 30px; font-weight: 700; letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 12px;
  }
  h1 .arrow { color: var(--amber); font-weight: 400; }
  .subtitle { color: var(--ink-dim); font-size: 14px; margin-top: 6px; }

  .controls {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .tabs { display: flex; gap: 6px; background: var(--panel); padding: 5px; border-radius: 12px; border: 1px solid var(--line); }
  .tab { background: transparent; color: var(--ink-dim); padding: 9px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
  .tab.active { background: var(--panel-2); color: var(--amber); }
  .meta { color: var(--ink-dim); font-size: 12px; font-family: var(--mono); display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }
  .dot.stale { background: var(--ink-dim); }
  button.ghost { background: transparent; color: var(--ink-dim); border: 1px solid var(--line); padding: 6px 12px; font-size: 12px; border-radius: 8px; cursor: pointer; }
  button.ghost:hover { color: var(--ink); }
  .filter-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-dim); cursor: pointer; user-select: none; }
  .filter-toggle input { accent-color: var(--amber); }

  .board { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
  .board-head {
    display: grid; grid-template-columns: 92px 1fr 96px;
    padding: 12px 18px; background: var(--panel-2);
    font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--ink-dim);
  }
  .row {
    display: grid; grid-template-columns: 92px 1fr 96px;
    padding: 16px 18px; border-top: 1px solid var(--line); align-items: center;
  }
  .row .time { font-family: var(--mono); font-size: 22px; font-weight: 700; }
  .row .time .new { color: var(--amber); }
  .row .time .old { color: var(--ink-dim); text-decoration: line-through; font-size: 14px; display: block; }
  .row .dest { font-size: 15px; }
  .row .dest .train-no { color: var(--ink-dim); font-size: 12px; font-family: var(--mono); margin-top: 3px; }
  .status {
    justify-self: end; font-size: 12px; font-weight: 700;
    padding: 6px 12px; border-radius: 20px; font-family: var(--mono);
    letter-spacing: .5px; white-space: nowrap;
  }
  .status.ontime { background: rgba(61,220,132,.14); color: var(--green); }
  .status.late { background: rgba(255,77,94,.14); color: var(--red); }
  .status.late-soft { background: rgba(255,138,61,.14); color: var(--orange); }
  .status.cancel { background: rgba(255,77,94,.22); color: var(--red); }
  .empty, .loading, .error { padding: 40px 18px; text-align: center; color: var(--ink-dim); font-size: 14px; }
  .error { color: var(--red); }
  footer { margin-top: 22px; color: var(--ink-dim); font-size: 12px; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">Tableau de bord</div>
    <h1>Angers <span class="arrow">⇄</span> Paris</h1>
    <div class="subtitle">Prochains départs et retards en temps réel · Données SNCF</div>
  </header>

  <div class="controls">
    <div class="tabs">
      <button class="tab active" data-dir="angers-paris">Angers → Paris</button>
      <button class="tab" data-dir="paris-angers">Paris → Angers</button>
    </div>
    <div class="meta">
      <label class="filter-toggle"><input type="checkbox" id="onlyLate"> Retards seulement</label>
      <span class="dot" id="liveDot"></span>
      <span id="lastUpdate">—</span>
      <button class="ghost" id="refreshBtn">Rafraîchir</button>
    </div>
  </div>

  <div class="board">
    <div class="board-head">
      <div>Départ</div>
      <div>Destination · Train</div>
      <div style="text-align:right;">État</div>
    </div>
    <div id="rows"><div class="loading">Chargement…</div></div>
  </div>

  <footer>Rafraîchissement automatique toutes les 60 secondes · Retards en <span style="color:var(--orange)">orange</span> puis <span style="color:var(--red)">rouge</span>.</footer>
</div>

<script>
let currentDir = "angers-paris";
let onlyLate = false;
let refreshTimer = null;
let lastData = [];

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentDir = tab.dataset.dir;
    loadTrains();
  });
});
document.getElementById("refreshBtn").addEventListener("click", loadTrains);
document.getElementById("onlyLate").addEventListener("change", (e) => {
  onlyLate = e.target.checked;
  render(lastData);
});

async function loadTrains() {
  const rows = document.getElementById("rows");
  rows.innerHTML = '<div class="loading">Chargement des prochains départs…</div>';
  try {
    // On appelle NOTRE mini-serveur, pas la SNCF directement.
    const res = await fetch(`/api/departures?dir=${currentDir}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      rows.innerHTML = `<div class="error">${err.error || "Erreur serveur (" + res.status + ")."}</div>`;
      setDot(false); return;
    }
    const data = await res.json();
    lastData = data.departures || [];
    render(lastData);
    stamp(); setDot(true);
  } catch (e) {
    rows.innerHTML = '<div class="error">Connexion au serveur impossible.</div>';
    setDot(false);
  }
}

function render(departures) {
  const rows = document.getElementById("rows");
  const destKey = currentDir === "angers-paris" ? "paris" : "angers";

  let list = departures.filter(d => {
    const info = d.display_informations || {};
    const dir = ((info.direction || "") + " " + (info.headsign || "")).toLowerCase();
    return dir.includes(destKey);
  });
  if (!list.length) list = departures;

  let built = list.slice(0, 20).map(d => ({ html: buildRow(d), late: isLate(d) }));
  if (onlyLate) built = built.filter(r => r.late);

  if (!built.length) {
    rows.innerHTML = onlyLate
      ? '<div class="empty">Aucun retard pour le moment 🎉</div>'
      : '<div class="empty">Aucun départ trouvé.</div>';
    return;
  }
  rows.innerHTML = built.map(r => r.html).join("");
}

function isLate(dep) {
  const st = dep.stop_date_time || {};
  return computeDelay(st.base_departure_date_time, st.departure_date_time) > 0;
}

function buildRow(dep) {
  const info = dep.display_informations || {};
  const st = dep.stop_date_time || {};
  const base = st.base_departure_date_time;
  const real = st.departure_date_time;
  const delayMin = computeDelay(base, real);
  const status = (info.status || "").toLowerCase();
  const isCancelled = status.includes("delet");

  const trainNo = info.headsign || info.trip_short_name || "—";
  const cleanDest = (info.direction || "—").replace(/\(.*?\)/g, "").trim();

  let statusHtml, timeHtml;
  if (isCancelled) {
    statusHtml = '<span class="status cancel">SUPPRIMÉ</span>';
    timeHtml = `<span class="new">${fmt(base)}</span>`;
  } else if (delayMin > 0) {
    const cls = delayMin >= 5 ? "late" : "late-soft";
    statusHtml = `<span class="status ${cls}">+${delayMin} MIN</span>`;
    timeHtml = `<span class="new">${fmt(real)}</span><span class="old">${fmt(base)}</span>`;
  } else {
    statusHtml = '<span class="status ontime">À L\'HEURE</span>';
    timeHtml = `<span class="new">${fmt(base)}</span>`;
  }
  return `<div class="row"><div class="time">${timeHtml}</div>`
       + `<div class="dest">${cleanDest}<div class="train-no">Train ${trainNo}</div></div>`
       + `<div>${statusHtml}</div></div>`;
}

function parseSncfDate(s) {
  if (!s) return null;
  return new Date(`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}T${s.slice(9,11)}:${s.slice(11,13)}:${s.slice(13,15)}`);
}
function fmt(s) { const dt = parseSncfDate(s); return dt ? dt.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}) : "—"; }
function computeDelay(base, real) {
  const b = parseSncfDate(base), r = parseSncfDate(real);
  if (!b || !r) return 0;
  return Math.round((r - b) / 60000);
}
function stamp() {
  document.getElementById("lastUpdate").textContent = "Mis à jour " +
    new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}
function setDot(live) { document.getElementById("liveDot").classList.toggle("stale", !live); }

function startAutoRefresh() { if (refreshTimer) clearInterval(refreshTimer); refreshTimer = setInterval(loadTrains, 60000); }

loadTrains();
startAutoRefresh();
</script>
</body>
</html>
